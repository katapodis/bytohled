<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 64" fill="none">

  <!-- Ikona: fialový čtverec s domečkem a lupou -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#4f46e5"/>

  <!-- Střecha -->
  <polygon points="32,10 10,28 54,28" fill="white"/>

  <!-- Stěny -->
  <rect x="14" y="28" width="36" height="26" rx="2" fill="white" opacity="0.92"/>

  <!-- Dveře -->
  <rect x="25" y="40" width="10" height="14" rx="2" fill="#4f46e5"/>

  <!-- Lupa – kruh -->
  <circle cx="46" cy="46" r="11" fill="#4f46e5" stroke="white" stroke-width="3.5"/>

  <!-- Lupa – rukojeť -->
  <line x1="54" y1="54" x2="62" y2="62" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Nápis: Byto -->
  <text
    x="78" y="46"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="900"
    fill="#18181b"
    letter-spacing="-1.5"
  >Byto</text>

  <!-- Nápis: Hled – fialová -->
  <text
    x="183" y="46"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="900"
    fill="#4f46e5"
    letter-spacing="-1.5"
  >Hled</text>

  <!-- Tečka mezi slovy jako akcent -->
  <circle cx="175" cy="42" r="4" fill="#a855f7"/>

</svg>

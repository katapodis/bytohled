<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BytoHled {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard">&#127968; BytoHled</a>
    <div class="navbar-nav ms-auto align-items-center">
      <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
      <a class="nav-link {% if request.url.path == '/listings' %}active{% endif %}" href="/listings">Inzer&aacute;ty</a>
      <form method="post" action="/logout" class="d-inline ms-2">
        <button class="btn btn-outline-light btn-sm">Odhl&aacute;sit</button>
      </form>
    </div>
  </div>
</nav>
<div class="container-fluid mt-4 px-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
